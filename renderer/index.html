<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: #2a2a38;
      --accent: #4f8ef7;
      --accent-dim: rgba(79, 142, 247, 0.15);
      --on: #3dd68c;
      --on-dim: rgba(61, 214, 140, 0.15);
      --off: #f7604f;
      --off-dim: rgba(247, 96, 79, 0.15);
      --warn: #f7c34f;
      --text: #e8e8f0;
      --text-muted: #6b6b82;
      --text-dim: #3a3a50;
      --danger: #f7604f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      -webkit-app-region: drag;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      -webkit-app-region: no-drag;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-mark svg { width: 16px; height: 16px; fill: white; }

    .logo-text {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      -webkit-app-region: no-drag;
    }

    .location {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .btn-settings {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: color 0.15s;
    }
    .btn-settings:hover { color: var(--text); }

    /* All controls */
    .all-controls {
      display: flex;
      gap: 10px;
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .all-controls .label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      margin-right: 6px;
    }

    /* Displays grid */
    .displays {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      padding: 24px 28px;
      overflow-y: auto;
      align-content: start;
    }

    .display-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color 0.2s;
    }

    .display-card:hover { border-color: #3a3a50; }

    .display-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }

    .display-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .display-meta {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      margin-top: 4px;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-dot.online { background: var(--on); box-shadow: 0 0 6px var(--on); }
    .status-dot.offline { background: var(--off); }
    .status-dot.checking { background: var(--warn); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .display-controls { display: flex; flex-direction: column; gap: 8px; }

    .display-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Buttons */
    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-on { background: var(--on-dim); color: var(--on); border: 1px solid rgba(61,214,140,0.3); }
    .btn-on:hover:not(:disabled) { background: rgba(61,214,140,0.25); }

    .btn-off { background: var(--off-dim); color: var(--off); border: 1px solid rgba(247,96,79,0.3); }
    .btn-off:hover:not(:disabled) { background: rgba(247,96,79,0.25); }

    .btn-input { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); font-size: 11px; }
    .btn-input:hover:not(:disabled) { color: var(--text); border-color: #3a3a50; }

    .btn-all-on { background: var(--on-dim); color: var(--on); border: 1px solid rgba(61,214,140,0.3); padding: 10px 20px; }
    .btn-all-on:hover:not(:disabled) { background: rgba(61,214,140,0.25); }

    .btn-all-off { background: var(--off-dim); color: var(--off); border: 1px solid rgba(247,96,79,0.3); padding: 10px 20px; }
    .btn-all-off:hover:not(:disabled) { background: rgba(247,96,79,0.25); }

    .btn-refresh { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); padding: 10px 14px; }
    .btn-refresh:hover { color: var(--text); }

    /* Status bar */
    .statusbar {
      padding: 8px 28px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .statusbar-msg { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .statusbar-msg.success { color: var(--on); }
    .statusbar-msg.error { color: var(--off); }

    .statusbar-time { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-dim); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Settings overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .settings-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .settings-title {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .btn-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .btn-close:hover { color: var(--text); }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .settings-section { display: flex; flex-direction: column; gap: 12px; }

    .settings-section-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      user-select: text;
    }

    .field input:focus { border-color: var(--accent); }
    .field input[type="password"] { letter-spacing: 0.1em; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Display entries */
    .display-entry {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .display-entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .display-entry-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .btn-remove {
      background: var(--off-dim);
      border: 1px solid rgba(247,96,79,0.2);
      border-radius: 5px;
      color: var(--off);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .btn-remove:hover { background: var(--off-dim); opacity: 0.8; }

    .btn-add-display {
      background: var(--accent-dim);
      border: 1px dashed rgba(79,142,247,0.3);
      border-radius: 10px;
      color: var(--accent);
      padding: 12px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-align: center;
      transition: all 0.15s;
    }
    .btn-add-display:hover { background: rgba(79,142,247,0.2); }

    .settings-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 10px 20px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
    }
    .btn-cancel:hover { color: var(--text); }

    .btn-save {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 10px 24px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .btn-save:hover { opacity: 0.9; }

    .key-toggle {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 0;
      margin-top: 4px;
      text-decoration: underline;
    }
    .key-toggle:hover { color: var(--text); }

    #s-displays {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-file {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 10px 16px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      transition: color 0.15s;
    }
    .btn-file:hover { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16"><path d="M8 1L1 5v6l7 4 7-4V5L8 1zm0 2.2L13 6l-5 2.8L3 6l5-2.8zM2 7.2l5 2.8v5.1L2 12.3V7.2zm6 7.9V10l5-2.8v5.1L8 15.1z"/></svg>
    </div>
    <span class="logo-text">Director</span>
  </div>
  <div class="header-right">
    <span class="location" id="location-label">Loading...</span>
    <button class="btn-settings" onclick="openSettings()" title="Settings">⚙</button>
  </div>
</header>

<div class="all-controls">
  <span class="label">All Displays</span>
  <button class="btn btn-all-on" onclick="allCommand('on')">&#9679; All On</button>
  <button class="btn btn-all-off" onclick="allCommand('off')">&#9679; All Off</button>
  <div style="flex:1"></div>
  <button class="btn btn-refresh" onclick="refreshHealth()" title="Refresh status">&#8635;</button>
</div>

<div class="displays" id="displays"></div>

<div class="statusbar">
  <span class="statusbar-msg" id="status-msg">Ready</span>
  <span class="statusbar-time" id="status-time"></span>
</div>

<div class="toast" id="toast"></div>

<!-- Settings overlay -->
<div class="overlay" id="settings-overlay">
  <div class="settings-panel">
    <div class="settings-header">
      <span class="settings-title">Settings</span>
      <button class="btn-close" onclick="closeSettings()">&#x2715;</button>
    </div>

    <div class="settings-body">

      <div class="settings-section">
        <div class="settings-section-title">General</div>
        <div class="field">
          <label>Location Name</label>
          <input type="text" id="s-location" placeholder="e.g. AD - Board Room"/>
        </div>
        <div class="field">
          <label>API Key</label>
          <input type="password" id="s-api-key" placeholder="Enter API key"/>
          <button class="key-toggle" onclick="toggleKeyVisibility()">Show</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section-title">Displays</div>
        <div id="s-displays"></div>
        <button class="btn-add-display" onclick="addDisplay()">+ Add Display</button>
      </div>

    </div>

    <div class="settings-footer">
      <button class="btn-file" onclick="window.director.openConfigDir()">Open Folder</button>
      <button class="btn-file" onclick="window.director.openConfigFile()">Open in Editor</button>
      <div style="flex:1"></div>
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
